<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#d926d5">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">   
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #fce4ec; /* Rosa muy suave */
            font-family: 'Montserrat', sans-serif;
        }
        h1, h2, h3, .btn, label {
            font-family: 'Fredoka', cursive;
        }
    
        .admin-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(217, 38, 213, 0.15);
            border: 2px solid #f8bbd0;
        }

        .form-label {
            color: #ad1457;
            font-weight: 600;
        }

        .btn-upload {
            background-color: #d926d5;
            color: white;
            border: none;
            transition: all 0.3s;
        }
        .btn-upload:hover {
            background-color: #b01eb0;
            color: white;
            transform: translateY(-2px);
        }

        .product-item {
            background: white;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid #ffc1e3;
            transition: transform 0.2s;
        }
        .product-item:hover {
            transform: scale(1.01);
            border-color: #d926d5;
        }
        
        .thumb-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #f8bbd0;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
        <div class="container">
            <span class="navbar-brand text-danger fw-bold" style="font-family: 'Fredoka'; font-size: 1.5rem;">
                <i class="bi bi-gear-fill"></i> Panel Admin
            </span>
            <a href="index.html" class="btn btn-outline-danger rounded-pill">
                <i class="bi bi-box-arrow-right"></i> Ir a la Tienda
            </a>
        </div>
    </nav>
    <div class="container my-5">
        <div class="row g-4">     
            <div class="col-lg-5">
                <div class="admin-card p-4">
                    <h4 class="mb-4 text-center" style="color: #d926d5;">Nuevo Producto</h4>                 
                    <form id="form-productos">                        
                        <div class="mb-3">
                            <label class="form-label">Nombre del Producto</label>
                            <input type="text" class="form-control" id="nombre" placeholder="Ej: Alcancía Spiderman" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Categoría</label>
                            <select class="form-select" id="categoria" required>
                                <option value="" selected disabled>Selecciona una opción...</option>
                            </select>
                        </div>
                        <div class="mb-3 p-3 bg-light rounded-3 border">
                            <label class="form-label text-primary"><i class="bi bi-image"></i> Foto de Portada (Principal)</label>
                            <input type="file" class="form-control mb-2" id="img-principal" accept="image/*" required>
                            <div id="preview-principal" class="mt-2 text-center"></div>
                        </div>
                        <div class="mb-3 p-3 bg-light rounded-3 border">
                            <label class="form-label text-secondary"><i class="bi bi-images"></i> Fotos Galería (Opcionales)</label>
                            <input type="file" class="form-control mb-2" id="img-galeria" accept="image/*" multiple>
                            <small class="text-muted">Selecciona varias para el carrusel.</small>
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-upload py-2 shadow fw-bold" id="btn-guardar">
                                <i class="bi bi-cloud-arrow-up-fill"></i> GUARDAR PRODUCTO
                            </button>
                        </div>                        
                        <div class="progress mt-3 d-none" id="barra-progreso-container">
                            <div class="progress-bar progress-bar-striped progress-bar-animated bg-danger" role="progressbar" style="width: 100%">Subiendo...</div>
                        </div>
                    </form>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="admin-card p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="mb-0" style="color: #6a1b9a;">Inventario Actual</h4>
                        <span class="badge bg-secondary" id="contador-productos">0 productos</span>
                    </div>
                    <div id="lista-productos" style="max-height: 600px; overflow-y: auto; padding-right: 10px;">
                        <div class="text-center text-muted py-5">
                            <div class="spinner-border text-danger" role="status"></div>
                            <p class="mt-2">Cargando inventario...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        // 1. IMPORTAMOS 'updateDoc' de Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCNiUdX80_2hRH_EHOsVxiZqFeP2PYXVGY",
            authDomain: "manos-de-angel-1c692.firebaseapp.com",
            projectId: "manos-de-angel-1c692",
            storageBucket: "manos-de-angel-1c692.firebasestorage.app",
            messagingSenderId: "102505109232",
            appId: "1:102505109232:web:9c2af7b8845140d8ad9435",
            measurementId: "G-LHZ40QXQ2N"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const CLOUD_NAME = "dbxmnnlar";      
        const UPLOAD_PRESET = "unsigned";

        const form = document.getElementById('form-productos');
        const listaProductos = document.getElementById('lista-productos');
        const barraProgreso = document.getElementById('barra-progreso-container');
        const btnGuardar = document.getElementById('btn-guardar');
        const inputImgPrincipal = document.getElementById('img-principal');
        const tituloFormulario = document.querySelector('.admin-card h4');
        
        // VARIABLES DE ESTADO PARA LA EDICIÓN
        let editStatus = false;
        let idProductoEditar = '';
        let productosGlobales = {}; // Guardaremos los productos en memoria para leerlos rápido

        const categorias = [
            "Caricaturas", "Lunetas", "Superhéroes", "Fútbol", 
            "Tamaños", "Princesas", "Halloween", "Unicornio", "Anime", 
            "Navidad", "Series Películas", "Oficios Profesiones", "Disfraces", 
            "Animales", "Novios", "Ceremonia", "Graduación", "Publicidad", 
            "Centros", "Fantasía", "Metas",
            "México", "Deportes" 
        ];

        const selectCat = document.getElementById('categoria');
        categorias.sort().forEach(cat => {
            const option = document.createElement('option');
            option.value = cat;
            option.text = cat;
            selectCat.appendChild(option);
        });

        inputImgPrincipal.addEventListener('change', function(e) {
            const file = e.target.files[0];
            const container = document.getElementById('preview-principal');
            container.innerHTML = '';
            if(file){
                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                img.style.height = '100px';
                img.style.borderRadius = '10px';
                container.appendChild(img);
            }
        });

        async function subirImagen(file) {
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);

            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: "POST",
                    body: formData
                });
                const data = await res.json();
                return data.secure_url;
            } catch (error) {
                console.error("Error subiendo imagen:", error);
                return null;
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            btnGuardar.disabled = true;
            btnGuardar.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Guardando...';
            barraProgreso.classList.remove('d-none');

            try {
                const nombre = document.getElementById('nombre').value.trim();
                const categoria = document.getElementById('categoria').value;
                
                const filePrincipal = inputImgPrincipal.files[0];
                let urlPrincipal = "";

                // LÓGICA DE IMAGEN: Si editamos y no hay foto nueva, conservamos la vieja
                if (editStatus) {
                    urlPrincipal = filePrincipal ? await subirImagen(filePrincipal) : productosGlobales[idProductoEditar].imagenPrincipal;
                } else {
                    if (filePrincipal) urlPrincipal = await subirImagen(filePrincipal);
                }

                const filesGaleria = document.getElementById('img-galeria').files;
                let urlsGaleria = editStatus ? (productosGlobales[idProductoEditar].galeria || []) : [];
                
                // Si suben fotos nuevas a la galería, sobreescribimos las anteriores
                if (filesGaleria.length > 0) {
                    urlsGaleria = [];
                    for (let i = 0; i < filesGaleria.length; i++) {
                        const url = await subirImagen(filesGaleria[i]);
                        if(url) urlsGaleria.push(url);
                    }
                }

                if (!editStatus) {
                    // MODO CREAR
                    await addDoc(collection(db, "productos"), {
                        nombre: nombre,
                        categoria: categoria,
                        imagenPrincipal: urlPrincipal,
                        galeria: urlsGaleria,
                        fecha: serverTimestamp()
                    });
                    alert("¡Producto guardado!");
                } else {
                    // MODO EDITAR
                    await updateDoc(doc(db, "productos", idProductoEditar), {
                        nombre: nombre,
                        categoria: categoria,
                        imagenPrincipal: urlPrincipal,
                        galeria: urlsGaleria
                        // No actualizamos la fecha para que no pierda su orden original
                    });
                    alert("¡Producto actualizado!");
                    
                    // Restaurar el formulario a "Modo Crear"
                    editStatus = false;
                    idProductoEditar = '';
                    tituloFormulario.innerText = "Nuevo Producto";
                    tituloFormulario.style.color = "#d926d5";
                    btnGuardar.innerHTML = '<i class="bi bi-cloud-arrow-up-fill"></i> GUARDAR PRODUCTO';
                    btnGuardar.classList.remove('btn-warning');
                    btnGuardar.classList.add('btn-upload');
                    inputImgPrincipal.setAttribute('required', 'true');
                }

                form.reset();
                document.getElementById('preview-principal').innerHTML = '';

            } catch (error) {
                console.error("Error:", error);
                alert("Error al guardar. Revisa la consola.");
            } finally {
                btnGuardar.disabled = false;
                if(!editStatus) btnGuardar.innerHTML = '<i class="bi bi-cloud-arrow-up-fill"></i> GUARDAR PRODUCTO';
                barraProgreso.classList.add('d-none');
            }
        });

        const q = query(collection(db, "productos"), orderBy("fecha", "desc"));

        onSnapshot(q, (snapshot) => {
            listaProductos.innerHTML = "";
            productosGlobales = {}; // Vaciamos y llenamos con datos frescos
            document.getElementById('contador-productos').innerText = `${snapshot.docs.length} productos`;

            snapshot.forEach((docSnap) => {
                const prod = docSnap.data();
                const id = docSnap.id;
                
                // Guardamos el producto en memoria para leerlo al editar
                productosGlobales[id] = prod;

                // AÑADIMOS EL BOTÓN DE EDITAR (Lápiz azul)
                listaProductos.innerHTML += `
                    <div class="product-item p-3 d-flex align-items-center justify-content-between">
                        <div class="d-flex align-items-center">
                            <img src="${prod.imagenPrincipal}" class="thumb-img me-3" alt="Foto">
                            <div>
                                <h6 class="mb-0 fw-bold" style="color: #6a1b9a;">${prod.nombre}</h6>
                                <small class="text-muted d-block">${prod.categoria}</small>
                                ${prod.galeria && prod.galeria.length > 0 ? 
                                    `<span class="badge bg-info text-dark rounded-pill mt-1" style="font-size:0.7rem">+${prod.galeria.length} fotos extra</span>` : ''}
                            </div>
                        </div>
                        <div>
                            <button class="btn btn-outline-primary btn-sm rounded-circle me-1" onclick="window.cargarEdicion('${id}')">
                                <i class="bi bi-pencil-fill"></i>
                            </button>
                            <button class="btn btn-outline-danger btn-sm rounded-circle" onclick="window.eliminarProducto('${id}')">
                                <i class="bi bi-trash-fill"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        });

        // NUEVA FUNCIÓN: CARGAR DATOS AL FORMULARIO
        window.cargarEdicion = (id) => {
            const prod = productosGlobales[id];
            
            document.getElementById('nombre').value = prod.nombre;
            document.getElementById('categoria').value = prod.categoria;
            
            // Mostrar imagen actual
            document.getElementById('preview-principal').innerHTML = `
                <img src="${prod.imagenPrincipal}" style="height: 100px; border-radius: 10px;">
                <p class="small text-muted mt-1 mb-0">Imagen actual. Sube otra si deseas cambiarla.</p>
            `;
            
            // Quitamos el required para que deje guardar si no cambia la foto
            inputImgPrincipal.removeAttribute('required');

            editStatus = true;
            idProductoEditar = id;

            // Cambiar aspecto del formulario
            tituloFormulario.innerText = "Editando: " + prod.nombre;
            tituloFormulario.style.color = "#ff9800"; // Naranja de edición
            
            btnGuardar.innerHTML = '<i class="bi bi-pencil-square"></i> ACTUALIZAR PRODUCTO';
            btnGuardar.classList.remove('btn-upload');
            btnGuardar.classList.add('btn-warning');
            
            // Subir la vista hacia el formulario
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.eliminarProducto = async (id) => {
            if(confirm("¿Seguro que quieres borrar este producto?")) {
                await deleteDoc(doc(db, "productos", id));
            }
        };
    </script>
</body>
</html>
